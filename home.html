<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat+Underline:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <title>NeonFrame</title>
</head>

<body>
    <header>

        <div class="left">
            <button class="bc">Cadastrar</button>
            <button class="bc">Entrar</button>
        </div>

        <div class="nick">
            <h1 class="N">Neon</h1>
            <h1 class="F">Frame</h1>
        </div>

        <div class="right">
            <input type="text" placeholder="Buscar">
        </div>

    </header>

    <main>
        <div class="corpin">
            <section class="selecao">
                <button>Filmes</button>
                <button>Lançamentos</button>
                <button>Lanchonete</button>
                <button>Combos</button>
            </section>
            <h2>Destaques</h2>
            <section class="destaque"></section>
            <h2>Promoções</h2>
            <section class="promo">
                <div class="promo-card">
                    <h3>Combo Neon</h3>
                    <p>Pipoca grande + 2 bebidas com desconto especial.</p>
                </div>

                <div class="promo-card">
                    <h3>Quarta Love</h3>
                    <p>Ingressos promocionais toda quarta-feira</p>
                </div>
            </section>
            <h2>Em Cartaz</h2>
            <div class="carrossel-container">
                <button class="seta seta-esquerda" id="btnVoltarTMDB">‹</button>

                <section class="tmdb-filmes"></section>

                <button class="seta seta-direita" id="btnAvancarTMDB">›</button>
            </div>

        </div>
    </main>

    <footer>

        <div class="logope">
            <img src="img/ChatGPT Image 9 de mai. de 2026, 19_02_57.png" alt="Logo NeonFrame" class="imgLogo">

            <p>NeonFrame © 2026</p>
        </div>

        <div class="cntt">
            <h3></h3>
            <p></p>
            <p></p>
            <p></p>

            <a href="#">Trabalhe conosco</a>
        </div>

        <div class="frase-footer">
            <h2>Onde cada frame acende uma emoção.</h2>
        </div>
    </footer>

    <script src="js/home.js"></script>
    <script src="js/tmbd.js"></script>
</body>

</html>
